<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="author" content="univ-lille" />
  <title>
    Marker
  </title>

  <link type="text/css" rel="stylesheet" href="main.css" />

  <script src="lib/opencv.js"></script>

  <script src="script/main.js" type="module"></script>




</head>

<body>

  <div id="capture">
    <img src="data/fixedImage02.png" />
    <video width="512px" src="data/cap00.webm" muted loop></video>
  </div>

  <div id="source-result">
    <h3>source image from capture (image/webcam/video) + final result</h3>
    <canvas id="source" width="500" height="500"></canvas>
    <canvas id="inter" width="500" height="500" ></canvas>
    <canvas id="result" width="500" height="500"></canvas>
  </div>

  <div id="feedback">
    <h3>OpenCV feedback (dstcv1, dstcv2, ...)</h3>
    <!-- openCV feedback -->
    <canvas id="dstcv1" width="500" height="500"></canvas>
    <canvas id="dstcv2" width="500" height="500"></canvas>
    <canvas id="dstcv3" width="500" height="500"></canvas>
  </div>

  <div id="extracted">
    <h3>extracted quad images</h3>
    <!-- marker feedback -->
    <canvas id="extracted0"></canvas>
    <canvas id="extracted1"></canvas>
    <canvas id="extracted2"></canvas>
    <canvas id="extracted3"></canvas>
    <canvas id="extracted4"></canvas>
    <canvas id="extracted5"></canvas>

  </div>

  

  <div id="markercode">
    <h3>marker code</h3>
    <canvas id="code0" width="100" height="100"></canvas>
    <canvas id="code1" width="100" height="100"></canvas>
    <canvas id="code2" width="100" height="100"></canvas>
    <canvas id="code3" width="100" height="100"></canvas>
    <canvas id="code4" width="100" height="100"></canvas>
    <canvas id="code5" width="100" height="100"></canvas>
    <canvas id="code6" width="100" height="100"></canvas>
    <canvas id="code7" width="100" height="100"></canvas>
  </div>
  

  <div id="progress">
    <h3>Intermediate results (canvas2D, canvasBg3D)</h3>
    <!-- intermediate result -->
    <canvas id="canvas2D" width="500" height="500"></canvas>
    <canvas id="canvasBg3D" width="500" height="500"></canvas>
  </div>


  <div id="texture">
    <h3>Examples of texture for THREE.js</h3>
    <!-- texture for feedback-->
    <img id="lagoon" src="data/hp.png" />
    <img id="bird" src="data/bird.png" />
    <img id="jupiter" src="data/jupiter.jpg" />
  </div>

  <h3>Example of recorded sound</h3>

  <!--
<audio id="sound" controls><source src="data/02_As_you_know.mp3" type="audio/mpeg"/></audio>
-->
  <audio id="sound" controls>
    <source src="data/recette.mp3" type="audio/mpeg" />
  </audio>


</body>

</html>
